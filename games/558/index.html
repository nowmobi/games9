<!DOCTYPE html>
<html lang="en-us">

  <head>




    <meta charset="utf-8">
    <title>bean</title>
    <style>
      html {
        box-sizing: border-box;
      }
      *, *:before, *:after {
        box-sizing: inherit;
      }
      body {
        margin: 0;
        background: #444;
      }
      #gameContainer {
        width: 100vw;
        height: 100vh;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      /* try to handle mobile dialog */
      canvas + * {
        z-index: 2;
      }
      .logo {
          display: block;
          width: max-width: 100vw;
          height: max-height: 70vh;
      }

      .progress {
          margin: 1.5em;
          border: 1px solid white;
          width: 50vw;
          display: none;
      }
      .progress .full {
          margin: 2px;
          background: white;
          height: 1em;
          transform-origin: top left;
      }

      #loader {
        position: absolute;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .spinner,
      .spinner:after {
        border-radius: 50%;
        width: 5em;
        height: 5em;
      }
      .spinner {
        margin: 10px;
        font-size: 10px;
        position: relative;
        text-indent: -9999em;
        border-top: 1.1em solid rgba(255, 255, 255, 0.2);
        border-right: 1.1em solid rgba(255, 255, 255, 0.2);
        border-bottom: 1.1em solid rgba(255, 255, 255, 0.2);
        border-left: 1.1em solid #ffffff;
        transform: translateZ(0);
        animation: spinner-spin 1.1s infinite linear;
      }
      @keyframes spinner-spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

    </style>
  
    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>

  <body>
    <div id="gameContainer"></div>
    <div id="loader">
      <img class="logo" src="logo.png" width=250 height=50 >
      <div class="spinner"></div>
      <div class="progress"><div class="full"></div></div>
    </div>
  </body>

  <script src="Build/UnityLoader.js"></script>
  <script>
  var gameInstance = UnityLoader.instantiate("gameContainer", "Build/bean car hidden.json", {onProgress: UnityProgress});
  function UnityProgress(gameInstance, progress) {
    if (!gameInstance.Module) {
      return;
    }
    const loader = document.querySelector("#loader");
    if (!gameInstance.progress) {
      const progress = document.querySelector("#loader .progress");
      progress.style.display = "block";
      gameInstance.progress = progress.querySelector(".full");
      loader.querySelector(".spinner").style.display = "none";
    }
    gameInstance.progress.style.transform = `scaleX(${progress})`;
    if (progress === 1 && !gameInstance.removeTimeout) {
      gameInstance.removeTimeout = setTimeout(function() {
          loader.style.display = "none";
      }, 2000);
    }
  }
  </script>

</html>
