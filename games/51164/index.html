
<!DOCTYPE html>
<html>
<head>
	<title>Christmas N Tiles</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<meta name="HandheldFriendly" content="true" />
	<meta name="mobile-web-app-capable" content="yes" />
	<link rel="stylesheet" href="game.css" type="text/css">
	<script type="text/javascript" src="js/libs/phaser.min.js"></script>

    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>
<body>
	<div style="font-family:robotomono; position:absolute; left:-1000px; visibility:hidden;">.</div>
	<div style="font-family:PoetsenOne; position:absolute; left:-1000px; visibility:hidden;">.</div>
	<div id="game_content"></div>

	<script type="text/javascript">
		var isAds = false;
		window.SDK_OPTIONS = {
			gameId: "iwvh7551p26t7zopgmiq59bmwd65hlra",
			onEvent: function (a) {
				switch (a.name) {
					case "SDK_GAME_PAUSE":
						// pause game logic / mute audio
						break;
					case "SDK_GAME_START":
						// advertisement done, resume game logic and unmute audio
						break;
					case "SDK_READY":
						// when sdk is ready
						break;
				}
			}
		};
		(function (a, b, c) {
			var d = a.getElementsByTagName(b)[0];
			a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
		})(document, "script", "gamemonetize-sdk");
	</script>
	<script>
		var gamesAPI = {
		config:{
			url: "http://www.willinggames.com/?utm_source=gm&utm_medium=christmas_n_tiles",
			credits_font_size: 28,
			credits_text_detail: 'Christmas N Tiles\n\nDeveloped by WillingGames\nhttps://www.willinggames.com\n© 2023 All rights reserved.',
			show_more_btn: true,
			tStamp: '2023/12/24',
			storageKey: 'wg_' + (document.title).toLowerCase().replace(/ /gm, '_')
		},
		show_ad: function(){
			if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
				sdk.showBanner();
			}
		},
	}
	</script>
	<script type="text/javascript" src="js/lib.js"></script>
	<script type="text/javascript" src="js/boot.js"></script>
	<script type="text/javascript" src="js/stages.js"></script>
	<script type="text/javascript" src="js/preload.js"></script>
	<script type="text/javascript" src="js/menu.js"></script>
	<script type="text/javascript" src="js/level.js"></script>
	<script type="text/javascript" src="js/game.js"></script>
</body>
</html>
