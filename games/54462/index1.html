<html>
<head>
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
        html, body {
            height: 100%
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
        }
        iframe {
            display: block;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            border: 0;
        }
    </style>
</head>
<body>

<iframe id="container" allowfullscreen></iframe>

<script type="application/javascript">
    function getParentUrl() {
        var url = (window.location !== window.parent.location)
            ? (document.referrer && document.referrer !== '')
                ? document.referrer
                : document.location.href
            : document.location.href;
        if (document.referrer.indexOf('localhost') !== -1) {
            url = 'https://gamemonetize.com/';
        }
        return url;
    }
    // Add the self-hosted game url as value of gameUrl.
   // rename original index.html into game.html and add link uncached with game id bottom example
    var gameUrl = 'https://uncached.gamemonetize.co/89mx1y96wldgwwyw0t56ff355db1sf93/game.html';
    document.getElementById('container').src = gameUrl + '?gamedomain=' + getParentUrl();
</script>

</body>
</html>
