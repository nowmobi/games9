<html>

<head>
	<meta name="viewport" content="initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=0,width=device-width" />
	<title>Xmas Float Connect</title>
	<meta charset="utf-8">
	<link rel="stylesheet" href="css/game.css">
	<script src="js/jquery-3.2.1.min.js"></script>
	<script src="js/howler.min.js"></script>
	<script src="js/class.js"></script>
	<script src="js/game.js"></script>
</head>

<body>
	<script type="text/javascript">
		(function ($) {
			$.fn.snow = function (options) {
				var $flake = $('<div id="snowbox" />').css({ 'position': 'absolute', 'z-index': '9999', 'top': '-50px', 'pointer-events': 'none' }).html('❄'),
					documentHeight = $(document).height(),
					documentWidth = $(document).width(),
					defaults = {
						minSize: 10,
						maxSize: 20,
						newOn: 500,
						flakeColor: "#ffffff" /*AFDAEF 此处可以定义雪花颜色，若要白色可以改为#FFFFFF */
					},
					options = $.extend({}, defaults, options);
				var interval = setInterval(function () {
					var startPositionLeft = Math.random() * documentWidth - 100,
						startOpacity = 0.5 + Math.random(),
						sizeFlake = options.minSize + Math.random() * options.maxSize,
						endPositionTop = documentHeight - 200,
						endPositionLeft = startPositionLeft - 500 + Math.random() * 500,
						durationFall = documentHeight * 10 + Math.random() * 5000;
					$flake.clone().appendTo('#gameContainer').css({
						left: startPositionLeft,
						opacity: startOpacity,
						'font-size': sizeFlake,
						color: options.flakeColor
					}).animate({
						top: endPositionTop,
						left: endPositionLeft,
						opacity: 0.2
					}, durationFall, 'linear', function () {
						$(this).remove()
					});
				}, options.newOn);
			};
		})(jQuery);
		$(function () {
			$.fn.snow({
				minSize: 5, /* 定义雪花最小尺寸 */
				maxSize: 50,/* 定义雪花最大尺寸 */
				newOn: 300  /* 定义密集程度，数字越小越密集 */
			});
		});
	</script>

	<script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "3ty581lmcmu8ux1pl6rcfatjetapa8e4",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
						gamesfineFn.gameOnBlur();
						is_ads = true;
                        break;
                    case "SDK_GAME_START":
						gamesfineFn.gameOnFocus();
						is_ads = false;
                    case "SDK_READY":
                        // when sdk is ready
                        break;
                }
            }
        };
        (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk"); 
    </script>

	<script type="text/javascript">
		var is_ads = false;
		if (!is_ads) {
			window.onfocus = function () {
				gamesfineFn.gameOnFocus();
			}
			window.onblur = function () {
				gamesfineFn.gameOnBlur();
			}
		}

		var GamesFine = {
			config: { url: 'http://www.gamesfine.com/?utm_source=gm&utm_medium=xmas_float_connect' },
			showAds: function () {
				if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
					sdk.showBanner();
				}
			},
			showMoreBtn: true,
			timeStamp: '2023/12/18'
		}

	</script>
	<div id="gameContainer">
	</div>
	<div id="orientationContainer">
		<h2>Please rotate your device</h2>
		<img class="rotate" src="images/rotate.png" alt="Please rotate your device">
		<img id="close" src="images/close.png" alt="X">
	</div>
</body>


</html>
