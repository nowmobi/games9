<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <title>Time Gems</title>
    <script src="ads.js"></script>
  
    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>
  <body>
    <script type="text/javascript">
      window.SDK_OPTIONS = {
        gameId: "hw9hz2my1ezyci7yavxz4cyg33e4o2bw",
        onEvent: function (a) {
          switch (a.name) {
            case "SDK_GAME_PAUSE":
              // pause game logic / mute audio
              Game.paused = true;
              Sound?.pause();
              break;
            case "SDK_GAME_START":
              // advertisement done, resume game logic and unmute audio
              setTimeout(() => Game.paused = false, 1000);
              Sound?.resume();
              break;
            case "SDK_READY":
              // when sdk is ready
              startTimeGame();
              break;
          }
        },
      };
      (function (a, b, c) {
        var d = a.getElementsByTagName(b)[0];
        a.getElementById(c) ||
          ((a = a.createElement(b)),
          (a.id = c),
          (a.src = "https://api.gamemonetize.com/sdk.js"),
          d.parentNode.insertBefore(a, d));
      })(document, "script", "gamemonetize-sdk");
    </script>
    <div id="loader">
      <div id="loading_content">
        <div class="lds-ellipsis">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
        <div class="text">Loading</div>
      </div>
      <button id="start_game">Start Game</button>
    </div>
    <div id="game"></div>
    <div style="width: 0; height: 0; overflow: hidden">
      <div id="a">a</div>
      <div id="b">b</div>
      <div id="c">c</div>
    </div>
  <script type="text/javascript" src="bundle.min.js"></script></body>
</html>
