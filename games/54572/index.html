<html>
<head>
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
        html, body {
            height: 100%
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
        }
        iframe {
            display: block;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            border: 0;
        }
    </style>

    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>
<body>

<iframe id="container" allowfullscreen></iframe>

<script type="application/javascript">
    function getParentUrl() {
        var url = (window.location !== window.parent.location)
            ? (document.referrer && document.referrer !== '')
                ? document.referrer
                : document.location.href
            : document.location.href;
        if (document.referrer.indexOf('localhost') !== -1) {
            url = 'https://gamemonetize.com/';
        }
        return url;
    }
    // Add the self-hosted game url as value of gameUrl.
    var gameUrl = 'https://uncached.gamemonetize.co/d40j605mv2tvjca7py8slgmansq7pmax/game.html';
    document.getElementById('container').src = gameUrl + '?gamedomain=' + getParentUrl();
</script>

</body>
</html>
