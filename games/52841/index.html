  <script type="text/javascript">
    console.error = console.log = console.info = console.warn = function () { };
    //在 iframe下 禁用 上下左右 促发滚动条
    const keysToBlockWhenFramed = [32, 33, 34, 35, 36, 37, 38, 39, 40, 44];
    document.addEventListener('keydown', function (info) {
      if (window != window.top && keysToBlockWhenFramed.indexOf(info.which) > -1) {
        info.preventDefault();
        info.stopPropagation();
      }
    }, true)
    document.addEventListener("mousedown", function () {
      window.focus();
    }, true);
    document.addEventListener("touchstart", function () {
      window.focus();
    }, true);
    document.addEventListener('gesturestart', function (event) {
      var event = event || window.event
      if (typeof event.preventDefault != 'undefined') {//w3c
        event.preventDefault();
      } else {
        event.returnValue = false;//ie
      }
    });
  </script>

    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

    var userAgentInfo = navigator.userAgent;
    var Agents = new Array("Android", "iPhone", "SymbianOS", "Windows Phone", "iPad", "iPod");
    var flag = true;
    for (var v = 0; v < Agents.length; v++) {
      if (userAgentInfo.indexOf(Agents[v]) > 0) {
        flag = false; break;
      }
    }
    if (flag == false) {
      h5splash.setGameLogoScale(0.4)
    }
    else {
      h5splash.setGameLogoScale(0.8)
    }
  </script>

  <script type="text/javascript">
    (function () {


      const userAgent = window.navigator.userAgent;
      const onMobile = userAgent.indexOf("Mobile") > -1;
      const onSafari = userAgent.indexOf("Safari") > -1;
      var gameDiv = document.getElementById("Game");
      if (onMobile && onSafari) {
        if (window.innerWidth > window.innerHeight) {
          gameDiv.style.marginTop = ((window.innerWidth * gameDiv.offsetHeight / gameDiv.offsetWidth) - window.innerHeight) / 2 + "px";
        } else {
          gameDiv.style.marginTop = "0px";
        }
        window.addEventListener("resize", (event) => {
          if (window.innerWidth > window.innerHeight && window.innerHeight == document.documentElement.clientHeight) {
            gameDiv.style.marginTop = ((window.innerWidth * gameDiv.offsetHeight / gameDiv.offsetWidth) - window.innerHeight) / 2 + "px";
          } else {
            gameDiv.style.marginTop = "0px";
          }
        }, false);
      }
      resolution.init(750, 1334);




      // open web debugger console
      if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
      }

      var debug = window._CCSettings.debug;

      function loadScript(moduleName, cb) {
        function scriptLoaded() {
          document.body.removeChild(domScript);
          domScript.removeEventListener('load', scriptLoaded, false);
          cb && cb();
        };
        var domScript = document.createElement('script');
        domScript.async = true;
        domScript.src = moduleName;
        domScript.addEventListener('load', scriptLoaded, false);
        document.body.appendChild(domScript);
      }

      loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.js', function () {
        if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
          loadScript(debug ? 'physics.js' : 'physics-min.js', window.boot);
        }
        else {
          window.boot();
        }
      });
    })();
  </script>
