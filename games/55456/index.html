<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pin Master</title>
  <link rel="stylesheet" href="TemplateData/style.css">
  <script src="TemplateData/gamepush-unity.js"></script>

  <script>
    const projectId = "15179";
    const publicToken = "GmmrM1DFVEzvSKDI5ud6NnLvIspZCcXT";
    const showPreloaderAd = "True";
    const overlayBackgroundColor = "#0072FF";
    const progressBarFillColor = "#FFFFFF";
    const progressBarBackgroundColor = "";
    const progressBarBorderColor = "";

    const autocallGameReady = "0";
  </script>

  <script>
    var _unityAwaiter = {};
    _unityAwaiter.ready = new Promise((resolve, reject) => {
      _unityAwaiter.done = resolve;
      _unityAwaiter.abort = reject;
    });

    var _gpAwaiter = {};
    _gpAwaiter.ready = new Promise((resolve) => {
      _gpAwaiter.done = resolve;
    });

    window.unityInstance = null;
    window.onGPError = async () => {
      _gpAwaiter.done();
      await _unityAwaiter.ready;
      window.unityInstance.SendMessage('GamePushSDK', 'CallOnSDKError');
    }

    window.onGPInit = async (gp) => {
      if (showPreloaderAd == "True" || showPreloaderAd == "1") {
        gp.ads.showPreloader();
      }

      window.GamePush = new GamePushUnity(gp);
      gp.player.ready.finally(_gpAwaiter.done);

      console.info("GamePush initialization in index.html deprecated!!!")
      await _unityAwaiter.ready;
      await _gpAwaiter.done;
      window.unityInstance.SendMessage('GamePushSDK', 'CallOnSDKReady');

      if (autocallGameReady != null && parseFloat(autocallGameReady) > 0) {
        setTimeout(() => gp.gameStart(), parseFloat(autocallGameReady));
      }
    };
  </script>

  <script>
    ((g, a, m, e) => { 
      let o = () => { 
        let p = document.createElement("script"); 
        p.src = `${a[0]}?projectId=${m}&publicToken=${e}`, 
        p.onerror = () => { 
          a.shift(), 
          a.length > 0 ? (o(), 
          p.remove()) : "onGPError" in g && g.onGPError() }, 
          document.head.appendChild(p) 
        }; 
        o() 
      })(window, ["https://gs.eponesh.com/sdk/gamepush.js", 
      "https://s3.eponesh.com/files/gs/sdk/gamepush.js", 
      "TemplateData/gp_bundle/gamepush.js"], 
      projectId, 
      publicToken);
  </script>


    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>

<body class="light">
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas"></canvas>
  </div>
  <div id="loading-cover" style="display:none;">
    <div id="unity-loading-bar">
      <div id="unity-logo"><img src="logo.png"></div>
      <div id="unity-progress-bar-empty" style="display: none;">
        <div id="unity-progress-bar-full"></div>
      </div>
      <div class="spinner"></div>
    </div>
  </div>

  <script>
    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/9853637125e801e9aae48e78dbbdcfca.loader.js";
    const config = {
      dataUrl: buildUrl + "/c79a482b9c7f7bf89f585c78ad30799f.data.unityweb",
      frameworkUrl: buildUrl + "/e1894ec4c934bc352373673d6c65b077.framework.js.unityweb",
      codeUrl: buildUrl + "/1332d30168545dc8ee0cd5b1a4b268e9.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Square Dino LLC",
      productName: "Pin Master",
      productVersion: "0.16.7",
    };

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const spinner = document.querySelector('.spinner');

    if (overlayBackgroundColor !== "-" && overlayBackgroundColor !== " " && overlayBackgroundColor !== "")
      canvas.style.background = overlayBackgroundColor;

    if (progressBarFillColor !== "-" && progressBarFillColor !== " " && progressBarFillColor !== "")
      progressBarFull.style.background = progressBarFillColor;

    if (progressBarBackgroundColor !== "-" && progressBarBackgroundColor !== " " && progressBarBackgroundColor !== "")
      progressBarEmpty.style.background = progressBarBackgroundColor;

    if (progressBarBorderColor !== "-" && progressBarBorderColor !== " " && progressBarBorderColor !== "")
      progressBarEmpty.style.border.color = progressBarBorderColor;


    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
    }

    canvas.style.background = "url('" + buildUrl + "/463d2f14566f82af19b0b2d2349f924d.jpg') center / cover";
    loadingCover.style.display = "";

    const unityLoader = document.createElement("script");
    unityLoader.src = loaderUrl;
    unityLoader.onload = async () => {
      await _gpAwaiter.ready;
      createUnityInstance(canvas, config, (progress) => {
        spinner.style.display = "none";
        progressBarEmpty.style.display = "";
        progressBarFull.style.width = `${100 * progress}%`;
      }).then((unityInstance) => {
        window.unityInstance = unityInstance;
        _unityAwaiter.done(unityInstance);
        loadingCover.style.display = "none";
      }).catch((message) => {
        _unityAwaiter.abort(message);
        alert(message);
      });
    };
    document.body.appendChild(unityLoader);

    document.addEventListener("pointerdown", () => {
      container.focus();
      window.focus();
      canvas.focus();
    });

  </script>
</body>

</html>
