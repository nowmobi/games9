<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Fish Jam</title>
  <meta name="viewport"
    content="width=device-width,user-scalable=no,initial-scale=1, minimum-scale=1,maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="renderer" content="webkit" />
  <meta name="force-rendering" content="webkit" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="full-screen" content="yes" />
  <meta name="x5-fullscreen" content="true" />
  <meta name="360-fullscreen" content="true" />
  <meta name="screen-orientation" content="" />
  <meta name="x5-orientation" content="">
  <meta name="x5-page-mode" content="app">
  <script src="https://www.936.com/h5games/xj/my.js"> </script>
  <!--适配-->
  <script src="./cc-resolution.js" charset="utf-8"></script>
  <style>
    body {
      cursor: default;
      padding: 0;
      margin: 0;
      text-align: center;
      background-color: white;
      font-family: Helvetica, Verdana, Arial, sans-serif;
    }

    body,
    canvas,
    div {
      outline: none;
      -webkit-tap-highlight-color: rgba(250, 250, 250, 0);
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      /* display: none; <- Crashes Chrome on hover */
      -webkit-appearance: none;
      margin: 0;
      /* <-- Apparently some margin are still there even though it's hidden */
    }

    #Cocos2dGameContainer {
      position: absolute;
      margin: 0;
      overflow: hidden;
      left: 0px;
      top: 0px;
    }

    canvas {
      background-color: rgba(255, 255, 255, 0);
    }


    #splash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background: #171717;
      background-size: 350px;
    }

    .progress-bar {
      background-color: #1a1a1a;
      position: absolute;
      left: 50%;
      top: 80%;
      height: 5px;
      width: 300px;
      margin: 0 -150px;
      border-radius: 5px;
      box-shadow: 0 1px 5px #000 inset, 0 1px 0 #444;
    }

    .progress-bar span {
      display: block;
      height: 100%;
      border-radius: 5px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, .5) inset;
      transition: width .4s ease-in-out;
      background-color: #3dc5de;
    }

    .stripes span {
      background-size: 30px 30px;
      background-image: linear-gradient(135deg, rgba(255, 255, 255, .15) 25%, transparent 25%,
          transparent 50%, rgba(255, 255, 255, .15) 50%, rgba(255, 255, 255, .15) 75%,
          transparent 75%, transparent);

      animation: animate-stripes 1s linear infinite;
    }

    @keyframes animate-stripes {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 60px 0;
      }
    }

    #GameDiv {
      margin: 0 auto;
      position: relative;
    }
  </style>


    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>

<body>
  <div id="GameDiv">
    <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
  </div>
  <div id="splash">
    <div class="progress-bar stripes">
      <span style="width: 0%"></span>
    </div>
  </div>
  <script src="src/settings.js" charset="utf-8"></script>
  <script src="main.js" charset="utf-8"></script>

  <script type="text/javascript">
    (function () {

      // open web debugger console
      if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
      }
      var debug = window._CCSettings.debug;
      var splash = document.getElementById('splash');
      splash.style.display = 'block';

      function loadScript(moduleName, cb) {
        function scriptLoaded() {
          document.body.removeChild(domScript);
          domScript.removeEventListener('load', scriptLoaded, false);
          cb && cb();
        };
        var domScript = document.createElement('script');
        domScript.async = true;
        domScript.src = moduleName;
        domScript.addEventListener('load', scriptLoaded, false);
        document.body.appendChild(domScript);
      }

      loadScript('cocos2d-js-min.js', function () {

        resolution.init(750, 1334)
        bundle.init().then(() => {
          if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
            loadScript(debug ? 'physics.js' : 'physics-min.js', window.boot);
          }
          else {
            window.boot();
          }
        })


      });
    })();
  </script>
</body>

</html>
