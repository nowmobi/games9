<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=2.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />


    <link
      href="css2.css" rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        background: #d9dddc;
        overflow: hidden;
      }
      #adContainer {
        position: absolute;
        bottom: 5px;
        left: 50%;
        transform: translateX(-50%);
      }
      .blur {
        animation: blur 3.1s;
        -webkit-animation: blur 3.1s;
        -moz-animation: blur 3.1s;
      }
      @keyframes blur {
        0%, 100% {
          -webkit-filter: blur(0px);
          -moz-filter: blur(0px);
          -o-filter: blur(0px);
          -ms-filter: blur(0px);
        }
        99% {
          -webkit-filter: blur(9px);
          -moz-filter: blur(9px);
          -o-filter: blur(9px);
          -ms-filter: blur(9px);
        }
      }
      /* @media screen and (min-width: 1024px) {
        #phaser-game {
          max-width: 700px;
          margin: 0 auto;
        }
      } */
    </style>
  <script type="text/javascript" src="GameMonetizeAD.min.js?v=1218920"></script>
  </head>
  <body>
    <div style="position: absolute;opacity: 0; font-family: Montserrat;">
      .
    </div>
    <div id="phaser-game"></div>
    <div id="adContainer"></div>
  <script type="text/javascript" src="bundle.min.js"></script></body>
</html>
