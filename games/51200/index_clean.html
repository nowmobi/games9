<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=2.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />


    <link
      href="css2.css" rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        background: #d9dddc;
        overflow: hidden;
      }
      #adContainer {
        position: absolute;
        bottom: 5px;
        left: 50%;
        transform: translateX(-50%);
      }
      .blur {
        animation: blur 3.1s;
        -webkit-animation: blur 3.1s;
        -moz-animation: blur 3.1s;
      }
      @keyframes blur {
        0%, 100% {
          -webkit-filter: blur(0px);
          -moz-filter: blur(0px);
          -o-filter: blur(0px);
          -ms-filter: blur(0px);
        }
        99% {
          -webkit-filter: blur(9px);
          -moz-filter: blur(9px);
          -o-filter: blur(9px);
          -ms-filter: blur(9px);
        }
      }
      /* @media screen and (min-width: 1024px) {
        #phaser-game {
          max-width: 700px;
          margin: 0 auto;
        }
      } */
    </style>
  <script type="text/javascript" src="GameMonetizeAD.min.js?v=1218920"></script>
  
    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>
  <body>
    <div style="position: absolute;opacity: 0; font-family: Montserrat;">
      .
    </div>
    <div id="phaser-game"></div>
    <div id="adContainer"></div>
  <script type="text/javascript" src="bundle.min.js"></script></body>
</html>
