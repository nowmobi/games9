<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">

  <title>Stacklands</title>

  <meta name="viewport"
    content="width=device-width,user-scalable=no,initial-scale=1, minimum-scale=1,maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="full-screen" content="yes" />
  <meta name="screen-orientation" content="portrait" />
  <meta name="x5-fullscreen" content="true" />
  <meta name="360-fullscreen" content="true" />

  <meta name="renderer" content="webkit" />
  <meta name="force-rendering" content="webkit" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

  <link rel="stylesheet" type="text/css" href="style-desktop.css" />
  <link rel="icon" href="favicon.ico" />
  <link rel='canonical' href='https://www.puzzlegame.com/Stacklands'/>
</head>

<style type="texts">
  * {
      margin: 0;
      padding: 0;
      overflow: hidden;
  }
  @font-face {
      font-family: "Arial";
      src: url("rrzzhh.ttf");
  }
  html {
      touch-action: none
  }
  body {
      overflow: hidden;
      /* 页面背景颜色 */
      background: #b6e6b8
  }
</style>

<body>
  <!-- <h1 class="header">duidiedalu</h1> -->


  <div id="Game" style="width:1280px; height: 720px;">
    <canvas id="GameCanvas" width="1280" height="720"></canvas>
    <div id="splash" style="display: none;">
      <div class="progress-bar stripes">
        <span style="width: 0%"></span>
      </div>
    </div>
  </div>


  <!-- <p class="footer">Made with <a href="https://www.cocos.com/products#CocosCreator" title="cocos creator">Cocos Creator</a></p> -->
  <script type="text/javascript" src="https://h5gamessdk.yyggames.com/sdk/YYGGames.js"></script>
  <script src="cc-resolution.js" charset="utf-8"></script>

  <link rel="stylesheet" type="text/css" href="style-desktop.css" />
  <script src="src/settings.js" charset="utf-8"></script>
  <script src="main.js" charset="utf-8"></script>

  <script type="text/javascript">
    (function () {
      resolution.init(1334, 750)
      console.log = console.info = console.warn = function () { };
      // open web debugger console
      if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
      }

      var debug = window._CCSettings.debug;
      var splash = document.getElementById('splash');
      splash.style.display = 'block';

      function loadScript(moduleName, cb) {
        function scriptLoaded() {
          document.body.removeChild(domScript);
          domScript.removeEventListener('load', scriptLoaded, false);
          cb && cb();
        };
        var domScript = document.createElement('script');
        domScript.async = true;
        domScript.src = moduleName;
        domScript.addEventListener('load', scriptLoaded, false);
        document.body.appendChild(domScript);
      }

      loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.js', function () {
        if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
          loadScript(debug ? 'physics.js' : 'physics-min.js', window.boot);
        }
        else {
          window.boot();
        }
      });
    })();
  </script>
  <script src="https://h5gamessdk.yyggames.com/sdk/h5splash.js"></script>
  <script>
    //'puzzlegame'
    //'yad'
    //初始化渠道
    h5splash.init({ appName: "Stacklands", channel: "puzzlegame" })
    //设置背景颜色
    h5splash.setBackgroundColor("#b6e6b8")
    //设置进度条背景颜色
    //h5splash.setProgressBackgroundColor("#fffff")
    //这是进度条颜色
    h5splash.setProgressValueColor("#4ba212")
    //这是进度条颜色 渐变色
    //h5splash.setProgressValueColor("#fffff","#ddd")
    h5splash.setSideLogoScale(0,0)
    // h5splash.setGameLogoScale(.7, .7)
  </script>
</body>

</html>
