<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Stockings Dilemma</title>

  <link rel="stylesheet" type="text/css" href="style-desktop.css"/>

  <link rel="preload" as="font" href="./GRILLEDCHEESE BTN TOASTED.TTF" type="fontf" crossorigin="anonymous">
  <script src="cc-resolution.js" charset="utf-8"></script>
  <style type="text/css">
    * {
        margin: 0;
        padding: 0;
        overflow: hidden;
    }
    @font-face {
        font-family: "Arial";
        src: url("GRILLEDCHEESE BTN TOASTED.TTF");

    html {
        touch-action: none
    }
    body {
        overflow: hidden;
        /* 页面背景颜色 */
        background: #faede6;
    }
</style>

    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>
<body>
<div id="Game" style="width:720px; height: 1280px;">
  <canvas id="GameCanvas" width="720" height="1280"></canvas>
  <div id="splash" style="display: none;">
    <div class="progress-bar stripes">
      <span style="width: 0%"></span>
    </div>
  </div>
</div>
<script src="src/settings.js" charset="utf-8"></script>
<script src="main.js" charset="utf-8"></script>
<script type="text/javascript" src="https://h5gamessdk.yyggames.com/sdk/YYGGames.js"></script>
<script type="text/javascript" src="https://h5gamessdk.yyggames.com/sdk/h5splash.js"></script>
<script type="text/javascript">
  console.timeEnd = console.time = console.error = console.log = console.info = console.warn = function () { };
  h5splash.init({appName: "Stockings-Dilemma", channel: "PUZZLEGAME"});
  // h5splash.init("h5games4u");
  h5splash.setGameLogoScale(0.8);
  //设置背景颜色
  h5splash.setBackgroundColor("#faede6");
  //设置进度条背景颜色
  //h5splash.setProgressBackgroundColor("#fffff")
  //这是进度条颜色
  //h5splash.setProgressValueColor("#fffff")
  //这是进度条颜色 渐变色
  //h5splash.setProgressValueColor("#fffff","#ddd")
  //隐藏页面
  //h5splash.hideLoading()
  //进度条描边颜色
  //h5splash.setProgressBorderColor()
(function () {
    // open web debugger console
    if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
    }

    var debug = window._CCSettings.debug;
    var splash = document.getElementById('splash');
    splash.style.display = 'block';

    function loadScript (moduleName, cb) {
      function scriptLoaded () {
          document.body.removeChild(domScript);
          domScript.removeEventListener('load', scriptLoaded, false);
          cb && cb();
      };
      var domScript = document.createElement('script');
      domScript.async = true;
      domScript.src = moduleName;
      domScript.addEventListener('load', scriptLoaded, false);
      document.body.appendChild(domScript);
    }

    loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.js', function () {
      if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
        loadScript(debug ? 'physics.js' : 'physics-min.js', window.boot);
      }
      else {
        window.boot();
      }
    });
})();
window.focusFlag = false;
window.addEventListener("focus", () => {
    cc.audioEngine.setMusicVolume(window.musicVolume1);
    cc.audioEngine.setEffectsVolume(window.effectVolume1);
});
window.addEventListener("blur", () => {
    window.musicVolume1 = window.musicVolume == null ? cc.audioEngine._music.volume : 0;
    window.effectVolume1 = window.effectVolume == null ? cc.audioEngine._effect.volume : 0;
    cc.audioEngine.setMusicVolume(0);
    cc.audioEngine.setEffectsVolume(0);
});
resolution.init(720, 1280);
</script>

</body>
</html>
