<!DOCTYPE html>
<html>
<head>
    <title>Ball Sort Halloween</title>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8">

    <meta property="og:image"
    content="https://bestgamesfreeplay.com/demo/ball-sort-halloween/media/graphics/misc/512x512.png" />
<meta property="og:description"
    content="Ball Sort Halloween, a color sorting game, is a fun and relaxing game that entertains and stimulates your brain! Quickly sort the colored balls in the tubes until all the same colors are together in the same tube. A challenging yet relaxing game to exercise your brain!" />


    <meta name="viewport" content="width=device-width,height=device-height, initial-scale=1, maximum-scale=1, user-scalable=0, shrink-to-fit=no, minimal-ui"/>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" type="text/css" href="game.css">
    <script type="text/javascript" src="game.js"></script>
    <link rel="manifest" href="manifest.json">

    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>

<div class="gamecenter-activator"></div>

<body onload="setTimeout(function(){window.scrollTo(0,1)},1);">
    <!--body-->
        <div id="xloader">
            <div id="game"><canvas id="canvas"></canvas></div>
            <div id="orientate"><img src="media/graphics/misc/orientation.png" /></div>
            <div id="play" class="play" onclick=""></div>
        </div>
    </body>
</html>
