<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.efbd0ba9.svg" />
    

    <title>10 Words Challenge</title>
    <script type="module" crossorigin src="./assets/index.812b2c6c.js"></script>
    <link rel="stylesheet" href="./assets/index.d8059305.css">
  
    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>
  <body>

    <div id="container">
      <div id="loading">Loading...</div>
    </div>

    

    <script type="text/javascript">
      window.SDK_OPTIONS = {
         gameId: "ai8n3ggkk98pl5b7xufeh79l80a86lb7",
         onEvent: function (a) {
            switch (a.name) {
               case "SDK_GAME_PAUSE":
                  break;
               case "SDK_GAME_START":
                  if (window.OnAdRewarded) window.OnAdRewarded({ amount: 1})
                  else 
                  break;
               case "SDK_READY":
                  if (!window.StartGame) window.addEventListener("load", () => window.StartGame())
                  else window.StartGame()
                  break;
            }
         }
      };
   (function (a, b, c) {
      var d = a.getElementsByTagName(b)[0];
      a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
   })(document, "script", "gamemonetize-sdk"); 
   </script>
  </body>
</html>
