<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Block Game Legend</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@200;500&display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@200;500&family=MuseoModerno:wght@600&display=swap');
    </style>
    <script src="telegram-web-app.js"></script>
  </head>
  <body class="dark">
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
    </div>
    <div id="loading-cover" style="display:none;">
      <div id="unity-loading-bar">
        <div id="unity-logo">
          <br>
          <p id="loading-txt" style="text-align: center; font-family: 'MuseoModerno', cursive;color: white;font-size: 50px;margin-top: 0px;margin-bottom: 0px;">Loading...</p>
        </div>
        <div id="unity-progress-bar-empty" style="display: none;">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div class="spinner"></div>
      </div>
    </div>
    <div id="unity-fullscreen-button" style="display: none;"></div>
    <script>
      function getQueryParam(param) {
        var urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
      }
      const hideFullScreenButton = "";
      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/45b36e8e21ba58810caa0daf4626b0db.loader.js";
      const config = {
        dataUrl: buildUrl + "/b27f6dfb7aaa5c1c8a7606611a804d5e.data.unityweb",
        frameworkUrl: buildUrl + "/ad54e8ca191df1596d7852ee623120b2.framework.js.unityweb",
        codeUrl: buildUrl + "/aff28cc1c6a60ed2a1cf0f6431029566.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "VTC",
        productName: "Block Game Legend",
        productVersion: "1.0.26",
      };
      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingCover = document.querySelector("#loading-cover");
      const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const fullscreenButton = document.querySelector("#unity-fullscreen-button");
      const spinner = document.querySelector('.spinner');
      const canFullscreen = (function() {
        for (const key of ['exitFullscreen', 'webkitExitFullscreen', 'webkitCancelFullScreen', 'mozCancelFullScreen', 'msExitFullscreen', ]) {
          if (key in document) {
            return true;
          }
        }
        return false;
      }());
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
      }
      loadingCover.style.display = "";
      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          spinner.style.display = "none";
          progressBarEmpty.style.display = "";
          progressBarFull.style.width = `${100 * progress}%`;
        }).then((unityInstance) => {
          loadingCover.style.display = "none";
              const telegramUser = JSON.parse(localStorage.getItem('telegram_user'));
			  let name_session;

// Check for the fields in order: username, first_name, last_name
if (telegramUser) {
    name_session = telegramUser.username || telegramUser.first_name || telegramUser.last_name || "Unknown User";
} else {
    name_session = "Unknown User"; // Fallback if userData is not found
}
    if (telegramUser && telegramUser.user_id) {
	 unityInstance.SendMessage('VMCServices', 'SetUserId', telegramUser.user_id+","+name_session);
	}else{
	Telegram.WebApp.ready();
          const initDataUnsafe = Telegram.WebApp.initDataUnsafe;
          const userID = initDataUnsafe.user ? initDataUnsafe.user.id : null;
          var userId = getQueryParam('userId'); // 
		  var name = getQueryParam("name");
		  const combinedData = userId+","+name;
//unityInstance.SendMessage('VMCServices', 'SetUserId', combinedData);
          //console.log("Telegram User Url",userId);
          // alert(userId);  
          if (userID) {
           // alert("TelegramApp User Url is " + userID);
            unityInstance.SendMessage('VMCServices', 'SetUserId', combinedData);
          } else if (userId) {
            // alert("TelegramApp User Url");
            console.log("Telegram User Url", userId);
            unityInstance.SendMessage('VMCServices', 'SetUserId', combinedData);
          } else {
           // alert("ko co user ID");
            console.log("Ko co user ID");
            unityInstance.SendMessage('VMCServices', 'SetUserId', '123456789,guest');
          }
		 }
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
