        <script type="text/javascript">
            isGrantReward = false;
            window.SDK_OPTIONS = {
                gameId: "en98nps66yop1z3pt5i81gad9ys3hw28",
                onEvent: function (a) {
                    console.log(a.name);
                    switch (a.name) {
                        case "SDK_GAME_PAUSE":
                            cc.game.emit("onGamePause");
                            // pause game logic / mute audio
                            console.log("SDK_GAME_PAUSE");
                            break;
                        case "SDK_GAME_START":
                            cc.game.emit("onGameResume");
                            // adertisement dvone, resume game logic and unmute audio
                            break;
                        case "AD_SDK_FINISHED":
                            if (isGrantReward) {
                                cc.game.emit("GratifyReward");
                            }
                            ADCALLBACKKEY = "";
                            isGrantReward = false;
                            cc.game.emit("onGameResume");
                            // adertisement dvone, resume game logic and unmute audio
                            break;
                        case "AD_SDK_MANAGER_READY":
                            isGrantReward = true;
                            break;
                        case "SDK_READY":
                            // when sdk is ready
                            console.log("SDK_READY");
                            break;
                        case "COMPLETE":
                            console.log("COMPLETE");
                            break;
                    }
                },
            };
            (function (a, b, c) {
                var d = a.getElementsByTagName(b)[0];
                a.getElementById(c) || ((a = a.createElement(b)), (a.id = c), (a.src = "https://api.gamemonetize.com/sdk.js"), d.parentNode.insertBefore(a, d));
            })(document, "script", "gamemonetize-sdk");
        </script>

        <script>
            ADCALLBACKKEY = "";
            function requestFullAds() {
                ADCALLBACKKEY = "";
                try {
                    if (typeof sdk !== "undefined" && sdk.showBanner !== "undefined") {
                        cc.game.emit("onGamePause");
                        sdk.showBanner();
                    }
                } catch (e) {}
            }
            function showRewardLocal(id) {
                ADCALLBACKKEY = id;
                try {
                    if (typeof sdk !== "undefined" && sdk.showBanner !== "undefined") {
                        cc.game.emit("onGamePause");
                        sdk.showBanner();
                    }
                } catch (e) {}
            }
        </script>
        <script type="text/javascript">
            (function () {
                // open web debugger console
                if (typeof VConsole !== "undefined") {
                    window.vConsole = new VConsole();
                }

                var debug = window._CCSettings.debug;
                var splash = document.getElementById("splash");
                splash.style.display = "block";

                function loadScript(moduleName, cb) {
                    function scriptLoaded() {
                        document.body.removeChild(domScript);
                        domScript.removeEventListener("load", scriptLoaded, false);
                        cb && cb();
                    }
                    var domScript = document.createElement("script");
                    domScript.async = true;
                    domScript.src = moduleName;
                    domScript.addEventListener("load", scriptLoaded, false);
                    document.body.appendChild(domScript);
                }

                loadScript(debug ? "cocos2d-js.js" : "cocos2d-js-min.js", function () {
                    if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
                        loadScript(debug ? "physics.js" : "physics-min.js", window.boot);
                    } else {
                        window.boot();
                    }
                });
            })();
        </script>
