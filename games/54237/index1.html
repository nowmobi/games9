   a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
})(document, "script", "gamemonetize-sdk"); 

    var SYS = function()
  {
      this.desktop = false;
      this.Type = 1;
      this.H_Scale = 1; 
      this.M_Scale = 1; 
      var ua = navigator.userAgent;
      if ((/Android/).test(ua))
      {
          this.android = true;
          this.desktop = false;
      }
      else if ((/CrOS/).test(ua))
      {
          this.chromeOS = true;
      }
      else if ((/iP[ao]d|iPhone/i).test(ua))
      {
          this.iOS = true;
          (navigator.appVersion).match(/OS (\d+)/);
          this.iOSVersion = parseInt(RegExp.$1, 10);
          this.desktop = false;
      }
      else if ((/Linux/).test(ua))
      {
          this.linux = true;
      }
      else if ((/Mac OS/).test(ua))
      {
          this.macOS = true;
      }
      else if ((/Windows/).test(ua))
      {
          this.windows = true;
      }
     if ((/Windows Phone/i).test(ua) || (/IEMobile/i).test(ua))
      {
          this.android = false;
          this.iOS = false;
          this.macOS = false;
          this.windows = true;
          this.windowsPhone = true;
      }
      var silk = (/Silk/).test(ua);
      if (this.windows || this.macOS || (this.linux) || this.chromeOS)
      {
          this.desktop = true;
      }
      if (this.windowsPhone || (((/Windows NT/i).test(ua)) && ((/Touch/i).test(ua))))
      {
          this.desktop = false;
      }
      this.WS_Width = window.screen.width;
      this.WS_Height = window.screen.height;
      if(this.WS_Width > this.WS_Height){
          this.Portrait = false;
          this.ratio = Math.round(this.WS_Width * 10000 / this.WS_Height)/10000;
      }else{
          this.Portrait = true;
          this.ratio = Math.round(this.WS_Height * 10000 / this.WS_Width)/10000;
      }
      this.DPR = Math.round(window.devicePixelRatio * 10)/10;
      if(this.ratio == 1.7778){
          this.StageW = 2560;
          this.StageH = 1440;
      }else if(this.ratio < 1.7778){
          this.StageW = 2560;
          this.StageH = Math.round(1440 * (1.7778 / this.ratio));
          this.H_Scale = 1.7778 / this.ratio;
      }else{
          this.StageW = Math.round(2560 * (this.ratio / 1.7778));
          this.StageH = 1440;
      }
      if ((this.DPR >= 2) && (this.ratio > 1.6)){
          this.Type = 0;
          this.M_Scale = 1.125;
      }
      this.scale = this.H_Scale * this.M_Scale;
  return this;
}
