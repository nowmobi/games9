<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#23282e" />
    <meta name="description" content="HTML5 Game" />
    <title>Battle Cards</title>
    <link rel="icon" type="image/svg+xml" href="/q4tsg2xlc5i3ba5obohyd8dqsapebylv/icons/favicon.svg" />
    <link rel="mask-icon" href="/q4tsg2xlc5i3ba5obohyd8dqsapebylv/icons/safari-pinned-tab.svg" color="#23282e" />
    <link rel="apple-touch-icon" sizes="180x180" href="/q4tsg2xlc5i3ba5obohyd8dqsapebylv/icons/apple-touch-icon.png" />
    <script type="module" crossorigin src="/q4tsg2xlc5i3ba5obohyd8dqsapebylv/assets/index-6683c2c0.js"></script>
    <link rel="stylesheet" href="/q4tsg2xlc5i3ba5obohyd8dqsapebylv/assets/index-3bf07f76.css">
  
    <style>
      /* 隐藏所有广告容器 */
      #imaContainer,
      #imaContainer_new,
      #sdk__advertisement,
      #gmLoadingText,
      iframe[src*="imasdk"],
      iframe[src*="doubleclick"],
      iframe[src*="googlesyndication"],
      iframe[title="Advertisement"],
      div[id*="google_ads"],
      div[id*="aswift"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      // 定期清除动态插入的广告元素
      setInterval(function() {
        var adSelectors = [
          '#imaContainer',
          '#imaContainer_new', 
          '#sdk__advertisement',
          '#gmLoadingText',
          'iframe[src*="imasdk"]',
          'iframe[src*="doubleclick"]',
          'iframe[src*="googlesyndication"]',
          'iframe[title="Advertisement"]',
          'div[id*="google_ads"]',
          'div[id*="aswift"]'
        ];
        
        adSelectors.forEach(function(selector) {
          var elements = document.querySelectorAll(selector);
          elements.forEach(function(el) {
            if (el && el.parentNode) {
              el.parentNode.removeChild(el);
            }
          });
        });

        // 阻止广告SDK函数
        if (window.sdk_init) window.sdk_init = function() {};
        if (window.sdk) window.sdk = { showBanner: function() {}, requestAd: function() {} };
        if (window.adBreak) window.adBreak = function() {};
        if (window.adConfig) window.adConfig = function() {};
      }, 500);
    </script>

  </head>
  <body>
    <div id="root"></div>
    
  </body>
</html>
