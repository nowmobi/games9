<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Prism City Detectives</title>
    <script type="text/javascript" src="plugin/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            width: 100%;
            height: 100%;
            position: absolute;
            overflow: hidden;
        }
        @font-face {
            font-family: 'KGRedHands';
            font-style: normal;
            font-weight: 400;
            src: url(assets/font/KGRedHands.ttf) format('truetype');
        }
    </style>
</head>
<body>
    <div style="font-family:KGRedHands; position:absolute; left:-1000px; visibility:hidden;">.</div>
    <div id='game'></div>
    <script src="js/loader.js"></script>
    <script src="js/ch1_dressup.js"></script>
    <script src="js/ch2_dressup.js"></script>
    <script src="js/ch3_dressup.js"></script>
    <script src="js/ch4_dressup.js"></script>
    <script src="js/ch5_dressup.js"></script>
    <script src="js/ch6_dressup.js"></script>
    <script src="js/ch7_dressup.js"></script>
    <script src="js/story.js"></script>
    <script src="js/endstory.js"></script>
    <script src="js/hiddenlevel1.js"></script>
    <script src="js/hiddenlevel2.js"></script>
    <script src="js/hiddenlevel3.js"></script>
    <script src="js/hiddenlevel4.js"></script>
    <script src="js/hiddenlevel5.js"></script>
    <script src="js/hiddenlevel6.js"></script>
    <script src="js/hiddenlevel7.js"></script>
    <script src="js/endPage.js"></script>
    <script src="js/title.js"></script>
    <script src="js/selection.js"></script>
    <script src="main.js"></script>
    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "x3obpbzypoow35rugg23vtcs2ra9ls05", // Fill the game_id
            onEvent: function(a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        if (pageNo > 1) {
                            soundoff = true;
                            if (volumeCount == 1) {
                                goodmusic.pause();
                            }
                            if (volumeCount1 == 1) {
                                morning.pause();
                            }
                            if (volumeCount2 == 1) {
                                badmusic.pause();
                            }
                            if (volumeCount3 == 1) {
                                horrorsound.pause();
                            }
                            game.scene.scenes[pageNo].scene.pause();
                        }
                        // pause game logic / mute audio
                        break;
                    case "SDK_GAME_START":
                        if (pageNo > 1) {
                            soundoff = false;
                            if (volumeCount == 1) {
                                goodmusic.resume();
                            }
                            if (volumeCount1 == 1) {
                                morning.resume();
                            }
                            if (volumeCount2 == 1) {
                                badmusic.resume();
                            }
                            if (volumeCount3 == 1) {
                                horrorsound.resume();
                            }
                            game.scene.scenes[pageNo].scene.resume();
                        }
                        // advertisement done, resume game logic and unmute audio
                        break;
                    case "SDK_READY":
                        // when sdk is ready
                        break;
                    case "SDK_ERROR":
                        // when sdk get error
                        break;
                }
            }
        };
        (function(a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c,
                a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk");
    </script>
</body>
</html>
